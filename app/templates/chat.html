<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cipher</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      
      html,
      body {
        height: 100%;
        overflow: hidden;
        font-family:
          system-ui,
          -apple-system,
          "Segoe UI",
          Inter,
          sans-serif;
        background: #000;
        color: #fff;
      }
      .app {
        display: flex;
        height: 100vh;
        width: 100vw;
      }

      /* Sidebar */
      .sidebar {
        width: 300px;
        background: #111;
        display: flex;
        flex-direction: column;
        border-right: 1px solid #1f1f1f;
      }
      .sidebar-header {
        padding: 20px 16px;
        border-bottom: 1px solid #1f1f1f;
      }
      .sidebar-header h1 {
        font-size: 1.4rem;
        font-weight: 700;
        color: #fff;
        letter-spacing: 0.5px;
      }
      .search-wrap {
        padding: 12px;
        border-bottom: 1px solid #1f1f1f;
      }
      .search-wrap input {
        width: 100%;
        padding: 10px 14px;
        background: #1c1c1c;
        border: 1px solid #262626;
        border-radius: 8px;
        color: #fff;
        font-size: 0.9rem;
        outline: none;
      }
      .search-wrap input::placeholder {
        color: #666;
      }
      .search-wrap input:focus {
        border-color: #3a3a3a;
      }

      .user-list {
        flex: 1;
        overflow-y: auto;
      }
      .user {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 12px 14px;
        cursor: pointer;
        border-bottom: 1px solid #181818;
      }
      .user:hover {
        background: #161616;
      }
      .user.active {
        background: #1d1d1d;
      }
      .avatar {
        width: 42px;
        height: 42px;
        border-radius: 50%;
        background: #fff;
        color: #000;
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: 700;
        font-size: 1rem;
        flex-shrink: 0;
      }
      .user-info {
        min-width: 0;
        flex: 1;
      }
      .username {
        color: #fff;
        font-size: 0.95rem;
        font-weight: 600;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .preview {
        color: #888;
        font-size: 0.82rem;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        margin-top: 2px;
      }

      /* Main */
      .main {
        flex: 1;
        display: flex;
        flex-direction: column;
        background: #0a0a0a;
        min-width: 0;
      }
      .main-header {
        padding: 16px 20px;
        border-bottom: 1px solid #1f1f1f;
        display: flex;
        align-items: center;
        gap: 12px;
        background: #101010;
      }
      .main-header .avatar {
        width: 36px;
        height: 36px;
        font-size: 0.9rem;
      }
      .main-header h2 {
        font-size: 1rem;
        font-weight: 700;
        color: #fff;
      }

      .messages {
        flex: 1;
        overflow-y: auto;
        padding: 20px;
        display: flex;
        flex-direction: column;
        gap: 10px;
      }
      .msg {
        max-width: 65%;
        padding: 9px 13px;
        border-radius: 10px;
        color: #fff;
        font-size: 0.92rem;
        line-height: 1.35;
        word-wrap: break-word;
      }
      .msg.sent {
        align-self: flex-end;
        background: #1e1e1e;
        border-bottom-right-radius: 3px;
      }
      .msg.received {
        align-self: flex-start;
        background: #2a2a2a;
        border-bottom-left-radius: 3px;
      }
      .msg .time {
        display: block;
        font-size: 0.7rem;
        color: #777;
        margin-top: 4px;
        text-align: right;
      }

      .input-bar {
        padding: 14px 16px;
        border-top: 1px solid #1f1f1f;
        display: flex;
        gap: 10px;
        background: #101010;
      }
      .input-bar input {
        flex: 1;
        padding: 11px 16px;
        background: #1c1c1c;
        border: 1px solid #262626;
        border-radius: 22px;
        color: #fff;
        font-size: 0.95rem;
        outline: none;
      }
      .input-bar input::placeholder {
        color: #666;
      }
      .input-bar input:focus {
        border-color: #3a3a3a;
      }
      .send-btn {
        padding: 0 22px;
        background: #fff;
        color: #000;
        border: none;
        border-radius: 22px;
        font-weight: 700;
        cursor: pointer;
        font-size: 0.9rem;
      }
      .send-btn:hover {
        background: #e5e5e5;
      }

      /* Scrollbars */
      ::-webkit-scrollbar {
        width: 8px;
      }
      ::-webkit-scrollbar-track {
        background: transparent;
      }
      ::-webkit-scrollbar-thumb {
        background: #222;
        border-radius: 4px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #2e2e2e;
      }

      @media (max-width: 640px) {
        .sidebar {
          width: 90px;
        }
        .sidebar-header h1,
        .search-wrap,
        .user-info {
          display: none;
        }
        .user {
          justify-content: center;
        }
      }
    </style>
  </head>
  <body>
    <div class="app">
      <aside class="sidebar">
        <div class="sidebar-header"><h1>Cipher</h1><strong><a style="text-decoration: none; color: #ffffff;, font-size: 30px;" href="/" id="logged-user"></a></strong></div>
        <div class="search-wrap">
          <input type="text" id="search-input" placeholder="Search users..." />
        </div>

        <div class="user-list" id="user-list">
          <div class="user active">
            <div class="avatar"></div>
            <div class="user-info">
              <div class="username"></div>
              <div class="preview" id="last-message"></div>
            </div>
          </div>
        </div>
      </aside>

      <main class="main">
        <div class="main-header" id="main-header">
          <div class="avatar"></div>
          <h2 id="chat-username"></h2>
        </div>

        <div class="messages" id="messages">
          
        </div>

        <form class="input-bar" id="message-form" onsubmit="return false;">
          <input type="text" placeholder="Type a message" id="message-input" />
          <button class="send-btn" type="submit">Send</button>
        </form>
      </main>
    </div>
    <script src="/static/chat.js"></script>
  </body>
</html>
