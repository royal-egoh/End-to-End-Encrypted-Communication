<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<link rel="stylesheet" href="https://pyscript.net/releases/2024.1.1/core.css">
<script type="module" src="https://pyscript.net/releases/2024.1.1/core.js"></script>
<title>Cipher Login</title>

<style>
:root {
  --bg: #0a0a0a;
  --card: #111111;
  --input: #1a1a1a;
  --text: #ffffff;
  --muted: #9a9a9a;
  --border: #2a2a2a;
}

* {
  box-sizing: border-box;
  font-family: system-ui, -apple-system, Segoe UI, Roboto, Inter, sans-serif;
}

body {
  margin: 0;
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  background: var(--bg);
  color: var(--text);
}

.card {
  width: 100%;
  max-width: 420px;
  background: var(--card);
  padding: 48px 36px;
  border-radius: 12px;
  box-shadow: 0 20px 60px rgba(0, 0, 0, 0.8);
}

.title {
  text-align: center;
  font-size: 2rem;
  font-weight: 700;
  color: var(--text);
  letter-spacing: 0.02em;
}

.subtitle {
  text-align: center;
  margin-top: 8px;
  font-size: 0.9rem;
  color: var(--muted);
}

.separator {
  height: 1px;
  background: #2a2a2a;
  margin: 24px 0;
}

.form-group {
  margin-bottom: 18px;
}

input {
  width: 100%;
  padding: 14px 12px;
  border-radius: 8px;
  border: 1px solid var(--border);
  background: var(--input);
  color: var(--text);
  outline: none;
  transition: 0.2s ease;
}

input:focus {
  border-color: #ffffff;
}

button {
  width: 100%;
  padding: 14px;
  margin-top: 6px;
  border-radius: 8px;
  border: none;
  background: #ffffff;
  color: #000000;
  font-weight: 600;
  cursor: pointer;
  transition: 0.2s ease;
}

button:hover {
  background: #e6e6e6;
}

.footer {
  margin-top: 16px;
  text-align: center;
  font-size: 0.85rem;
  color: var(--muted);
}

.footer a {
  color: #ffffff;
  text-decoration: underline;
}
</style>
</head>

<body>
  <div class="card">
    <div class="title">Cipher</div>
    <div class="subtitle">End-to-end encrypted messaging</div>

    <div class="separator"></div>

    <form id="login-form">
      <div class="form-group">
        <input type="text" placeholder="Username" name="username" id="username" required />
      </div>

      <div class="form-group">
        <input type="password" placeholder="Password" name="password" id="password" required />
      </div>

      <button type="submit">Login</button>
    </form>

    <div class="footer">
      Don't have an account? <a href="/register">Register</a>
    </div>
  </div>

   <script type="py">
    from pyscript import document, window
    from pyodide.http import pyfetch
    import asyncio
    import json
    
    async def login():
        username_input = document.getElementById("username").value
        password_input = document.getElementById("password").value

        response = await pyfetch("/api/auth/login", method="POST", body={
            "username": username_input,
            "password": password_input
        }, body=f"username={username_input}&password={password_input}")
        if response.ok:
            data = await response.json()
            token = data.get("access_token")
            window.localStorage.setItem("token", token)
            window.location.href = "/chat"
        else:
            window.alert("Login failed. Please check your credentials.")

    async def handle_submit(event):
        event.preventDefault()
        await login()

    document.getElementById("login-form").addEventListener("submit", handle_submit)
    
    </script>
</body>
</html>
